<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Responsive Hero Page</title>
    
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <main class="hero-wrapper">
        <section class="hero-content">
            <h1>Build Smarter Responsive Pages</h1>
            <p>
                This hero section uses <strong>CSS Flexbox</strong> to automatically 
                adjust its layout. On mobile, it stacks; on desktop, it spans.
            </p>
            <a href="#" class="cta-button">Get Started Now</a>
        </section>

        <section class="hero-image">
            <img src="https://images.unsplash.com/photo-1551434678-e076c223a692?auto=format&fit=crop&w=800&q=80" alt="Team collaborating">
        </section>
    </main>

</body>
</html>
